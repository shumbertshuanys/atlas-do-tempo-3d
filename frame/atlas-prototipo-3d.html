<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas do Tempo — protótipo 3D (cosmos navegável)</title>
<style>
  :root{
    --abyss:#070b14; --panel:#0f1828ee; --panel-2:#16223699; --hair:#26354B; --hair-2:#1d2a3d;
    --vellum:#ECE6D8; --dim:#A9B2C0; --faint:#73809a; --mid:#7E8BA3;
    --fact:#5BBF9B; --interp:#E0A458; --estimate:#C77DA6; --review:#7E8BA3; --crit:#D9685F;
    --lens-hist:#7FA8D9; --lens-geo:#C99A6A; --lens-quim:#9BD0C0; --lens-vida:#A6C97E; --lens-fis:#B69BD0;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--abyss);color:var(--vellum);font-family:var(--sans);font-size:15px;overflow:hidden;-webkit-font-smoothing:antialiased}
  #app{position:fixed;inset:0;display:flex;flex-direction:column}

  header{display:flex;flex-wrap:wrap;align-items:center;gap:10px 18px;padding:10px clamp(12px,2.5vw,22px);z-index:6;background:linear-gradient(180deg,#070b14ee,#070b1400)}
  .brand{margin-right:auto;min-width:0}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(16px,2.4vw,22px);line-height:1.05;margin:1px 0 0}
  .lens{display:inline-flex;flex-wrap:wrap;background:#0f1828cc;border:1px solid var(--hair);border-radius:999px;padding:3px;gap:2px}
  .lens .lab{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:0 7px;align-self:center}
  .lens button{font:inherit;font-size:12px;color:var(--dim);background:transparent;border:0;padding:6px 11px;border-radius:999px;cursor:pointer;white-space:nowrap;display:inline-flex;gap:6px;align-items:center}
  .lens button .d{width:7px;height:7px;border-radius:50%;background:currentColor}
  .lens button[aria-pressed="true"]{background:var(--vellum);color:#10151c;font-weight:600}
  button:focus-visible{outline:2px solid var(--vellum);outline-offset:2px}

  /* time axis */
  .axiswrap{padding:0 clamp(12px,2.5vw,22px) 6px;z-index:6}
  .axisbox{background:#0b1322cc;border:1px solid var(--hair);border-radius:10px;padding:8px 12px 4px;backdrop-filter:blur(4px)}
  .axislabel{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
  .axislabel .t{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint)}
  .axislabel .read{font-family:var(--mono);font-size:12px;color:var(--vellum)}
  svg.axis{display:block;width:100%;height:74px;touch-action:none;cursor:pointer}

  /* stage */
  .stage{position:relative;flex:1;min-height:0}
  #gl{position:absolute;inset:0;display:block}
  .hint{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);font-family:var(--mono);font-size:10.5px;color:#9fb0c6aa;background:#0b1322aa;border:1px solid var(--hair);border-radius:999px;padding:6px 13px;pointer-events:none;z-index:4;white-space:nowrap}
  .tooltip{position:absolute;pointer-events:none;z-index:5;font-size:11.5px;background:#0b1322ee;border:1px solid var(--hair);border-radius:6px;padding:4px 8px;color:var(--vellum);transform:translate(-50%,-150%);white-space:nowrap;display:none}

  /* period summary panel (corner) */
  .summary{position:absolute;top:14px;left:14px;width:min(310px,72vw);max-height:calc(100% - 28px);overflow:auto;background:var(--panel);border:1px solid var(--hair);border-radius:12px;padding:14px;z-index:5;backdrop-filter:blur(6px)}
  .summary h2{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);margin:0 0 2px}
  .summary .scene{font-family:var(--serif);font-size:18px;line-height:1.1;margin:2px 0 2px}
  .summary .era{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:10px}
  .bread{font-family:var(--mono);font-size:11px;color:var(--dim);margin:2px 0 10px}
  .bread .bt{color:var(--interp)} .bread .bl{color:var(--vellum)} .bread .bn{color:var(--faint)}
  .sitem{display:flex;gap:9px;align-items:flex-start;width:100%;text-align:left;background:transparent;border:0;border-top:1px solid var(--hair-2);padding:9px 2px;cursor:pointer;color:var(--dim);font:inherit;font-size:13px}
  .sitem:hover{color:var(--vellum)}
  .sitem .dot{width:9px;height:9px;border-radius:50%;flex:none;margin-top:5px}
  .sitem.med .dot{opacity:.5}
  .sitem .nm{line-height:1.3}
  .sitem .sub{font-family:var(--mono);font-size:9.5px;color:var(--faint)}
  .summary .tally{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:10px;border-top:1px solid var(--hair-2);padding-top:8px}
  .summary .tally b{color:var(--interp)}
  .summary .lensnote{font-size:11.5px;color:var(--faint);margin-top:8px}

  /* dossier slide-in */
  .dossier{position:absolute;top:0;right:0;height:100%;width:min(420px,92vw);background:var(--panel);border-left:1px solid var(--hair);padding:16px 18px 22px;z-index:7;overflow:auto;transform:translateX(102%);transition:transform .28s ease;backdrop-filter:blur(8px)}
  .dossier.open{transform:none}
  @media(prefers-reduced-motion:reduce){.dossier{transition:none}}
  .dossier .x{position:absolute;top:12px;right:12px;background:#16223699;border:1px solid var(--hair);color:var(--dim);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px}
  .doss-type{font-family:var(--mono);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint)}
  .doss-title{font-family:var(--serif);font-size:21px;line-height:1.1;margin:3px 36px 4px 0}
  .doss-id{font-family:var(--mono);font-size:10.5px;color:var(--faint);word-break:break-all}
  .doss-claim{font-size:14.5px;margin:13px 0 8px}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .chip{font-family:var(--mono);font-size:10.5px;border-radius:6px;padding:4px 8px;border:1px solid var(--hair);display:inline-flex;align-items:center;gap:6px;color:var(--dim)}
  .swatch{width:9px;height:9px;border-radius:2px;flex:none}
  .meta{font-size:12.5px;color:var(--dim);margin:8px 0;display:grid;grid-template-columns:auto 1fr;gap:4px 12px}
  .meta dt{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding-top:1px}
  .meta dd{margin:0}
  .src{font-family:var(--mono);font-size:11.5px}.pend{color:var(--interp)}
  .know{margin:12px 0;padding:10px 12px;border-left:3px solid var(--fact);background:#0e1a14;border-radius:0 8px 8px 0;font-size:12.5px}
  .know b{color:var(--fact);font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:4px}
  .warn{margin:10px 0;padding:10px 12px;border-left:3px solid var(--interp);background:#1c1609;border-radius:0 8px 8px 0;font-size:12.5px}
  .warn b{color:var(--interp);font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:4px}
  .gate{margin:10px 0;padding:10px 12px;border-left:3px solid var(--review);background:#141a24;border-radius:0 8px 8px 0;font-size:12.5px;color:var(--dim)}
  .gate.crit{border-left-color:var(--crit);background:#1d1311}
  .gate b{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:4px;color:var(--dim)}.gate.crit b{color:var(--crit)}
  .teaser{font-size:13.5px;color:var(--dim);margin:12px 0}
  .soon{margin-top:14px;border:1px dashed var(--hair);border-radius:8px;padding:12px 14px;font-size:12.5px;color:var(--faint)}
  .soon b{color:var(--interp);font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:4px}
  .cs{margin-top:14px;border:1px solid var(--hair);border-radius:8px;overflow:hidden}
  .cs-h{padding:9px 12px;background:#0f1828;display:flex;align-items:center;gap:8px;font-size:12.5px}
  .cs-status{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-left:auto}
  .cs-side{padding:9px 12px;border-top:1px solid var(--hair);font-size:12.5px;display:flex;gap:10px}
  .cs-w{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);border:1px solid var(--hair);border-radius:5px;padding:2px 5px;height:fit-content;white-space:nowrap;flex:none;margin-top:1px}
  .cs-noeq{padding:9px 12px;border-top:1px solid var(--crit);background:#1d1311;font-size:12px;color:#e7b3ad}
  .cs-noeq b{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:3px;color:var(--crit)}
  .cs-note{padding:11px 12px;border-top:1px solid var(--hair);font-size:12.5px;color:var(--dim)}
  .loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--faint);font-family:var(--mono);font-size:13px;z-index:8}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <span class="eyebrow">Atlas do Tempo · protótipo 3D · cosmos navegável (estilizado)</span>
      <h1>Big Bang → hoje, num só lugar</h1>
    </div>
    <div class="lens" role="group" aria-label="Lente de domínio">
      <span class="lab">Lente</span>
      <button data-lens="todas" aria-pressed="true" onclick="setLens('todas')">Todas</button>
      <button data-lens="fisica" aria-pressed="false" onclick="setLens('fisica')"><span class="d" style="color:var(--lens-fis)"></span>Física/cosmos</button>
      <button data-lens="quimica" aria-pressed="false" onclick="setLens('quimica')"><span class="d" style="color:var(--lens-quim)"></span>Química</button>
      <button data-lens="geologia" aria-pressed="false" onclick="setLens('geologia')"><span class="d" style="color:var(--lens-geo)"></span>Geologia</button>
      <button data-lens="vida" aria-pressed="false" onclick="setLens('vida')"><span class="d" style="color:var(--lens-vida)"></span>Vida</button>
      <button data-lens="historia" aria-pressed="false" onclick="setLens('historia')"><span class="d" style="color:var(--lens-hist)"></span>História</button>
    </div>
  </header>

  <div class="axiswrap">
    <div class="axisbox">
      <div class="axislabel"><span class="t">Eixo do tempo — escala log · arraste o cursor</span><span class="read" id="read">—</span></div>
      <svg class="axis" id="axis" viewBox="0 0 1000 74" preserveAspectRatio="none" role="img" aria-label="Eixo logarítmico do tempo, do Big Bang até hoje. Arraste o cursor para navegar."></svg>
    </div>
  </div>

  <div class="stage">
    <canvas id="gl"></canvas>
    <div class="loading" id="loading">carregando o cosmos…</div>
    <div class="tooltip" id="tip"></div>
    <div class="hint" id="hint">arraste para girar · role para zoom · arraste o tempo acima para viajar</div>
    <aside class="summary" id="summary" aria-live="polite"></aside>
    <aside class="dossier" id="dossier" aria-live="polite"></aside>
  </div>
</div>

/* ============ EIXO (HTML/SVG) ============ */
const LMAX=Math.log10(13.8e9), AX={x0:24,x1:976,W:952,y:46};
const lp=t=>Math.log10(Math.max(t,1));
const macroX=t=>AX.x0+(1-lp(t)/LMAX)*AX.W;
const xToTBP=x=>Math.pow(10, LMAX*(1-(Math.min(AX.x1,Math.max(AX.x0,x))-AX.x0)/AX.W));
function fmtTime(t){ if(t>=1e9)return (t/1e9).toFixed(t>=1e10?1:2).replace('.',',')+" Ga"; if(t>=1e6)return Math.round(t/1e6)+" Ma"; if(t>=1e4)return Math.round(t/1e3)+" ka"; const y=2026-Math.round(t); return y>0?("ano "+y):("hoje"); }
function sceneMatchesLens(id){return LENS==="todas"||SCENES[id].domains.includes(LENS);}

function renderAxis(){
  const s=document.getElementById('axis'); let h="";
  const bf=["#11182a","#0e1626","#121a2c","#0e1828"];
  BANDS.forEach((b,i)=>{const xa=macroX(b.a),xb=macroX(b.b);h+=`<rect x="${xa}" y="30" width="${Math.max(0,xb-xa)}" height="30" fill="${bf[i]}"/>`;h+=`<text x="${(xa+xb)/2}" y="26" font-size="8.5" text-anchor="middle" fill="#6E7A8C" font-family="monospace">${b.name}</text>`;});
  h+=`<line x1="${AX.x0}" y1="${AX.y}" x2="${AX.x1}" y2="${AX.y}" stroke="#26354B" stroke-width="1.3"/>`;
  ANCHORS.forEach(a=>{const x=macroX(a.tBP);h+=`<line x1="${x}" y1="${AX.y-4}" x2="${x}" y2="${AX.y+4}" stroke="#3a4d6b"/>`;h+=`<text x="${x}" y="${AX.y+16}" font-size="8.5" text-anchor="middle" fill="#6E7A8C" font-family="monospace">${a.sub}</text>`;});
  // scene markers
  Object.values(SCENES).forEach(sc=>{const x=macroX(sc.tBP);const on=sceneMatchesLens(sc.id);const act=activeScene===sc.id;
    h+=`<g class="scmk" style="cursor:pointer;opacity:${on?1:.4}" data-id="${sc.id}">`;
    h+=`<circle cx="${x}" cy="${AX.y}" r="${act?6:4.5}" fill="${act?'#ECE6D8':(on?'#9fb0c6':'#3a4d6b')}" stroke="#070b14" stroke-width="1.6"/>`;
    h+=`<text x="${x}" y="14" font-size="8" text-anchor="middle" fill="#8b97aa" font-family="monospace">${sc.era}</text>`;
    h+=`</g>`;});
  // playhead
  const px=macroX(activeTBP);
  h+=`<line x1="${px}" y1="6" x2="${px}" y2="64" stroke="#E0A458" stroke-width="1.4"/>`;
  h+=`<path d="M${px-5},6 L${px+5},6 L${px},13 Z" fill="#E0A458"/>`;
  s.innerHTML=h;
  document.getElementById('read').textContent=fmtTime(activeTBP);
  s.querySelectorAll('.scmk').forEach(g=>g.addEventListener('pointerdown',e=>{e.stopPropagation();goToScene(g.dataset.id);}));
}
// drag playhead
(function(){const s=document.getElementById('axis');let drag=false;
  const toVB=cx=>{const r=s.getBoundingClientRect();return (cx-r.left)/r.width*1000;};
  const set=cx=>{activeTBP=xToTBP(toVB(cx));updateFromTBP();};
  s.addEventListener('pointerdown',e=>{drag=true;s.setPointerCapture(e.pointerId);set(e.clientX);});
  s.addEventListener('pointermove',e=>{if(drag)set(e.clientX);});
  s.addEventListener('pointerup',()=>drag=false);
  s.addEventListener('pointercancel',()=>drag=false);
})();

function nearestSceneInStage(){
  const cosmic=activeTBP>EARTH_FORM; let best=null,bd=1e9;
  Object.values(SCENES).forEach(sc=>{const isC=sc.tBP>EARTH_FORM; if(isC!==cosmic)return; const d=Math.abs(lp(sc.tBP)-lp(activeTBP)); if(d<bd){bd=d;best=sc.id;}});
  return best||(cosmic?"galaxies":"s1789");
}
function updateFromTBP(){
  const cosmic=activeTBP>EARTH_FORM; const newMode=cosmic?"cosmic":"earth";
  const ns=nearestSceneInStage();
  const sceneChanged=ns!==activeScene; activeScene=ns;
  if(newMode!==stageMode){stageMode=newMode; setStage(newMode);}
  if(stageMode==="earth" && sceneChanged) buildEarthMarkers();
  renderAxis(); renderSummary();
}
function goToScene(id){activeTBP=SCENES[id].tBP; updateFromTBP();}

let renderer,scene,camera,cosmicGroup,earthGroup,globe,markersGroup,raycaster,mouse,W,H;
let cam={r:340,theta:0.7,phi:1.25,target:new THREE.Vector3(0,0,0)};
const EARTH_CAM={r:330,min:200,max:620}, COSMIC_CAM={r:520,min:260,max:1400};
const markerMeshes=[]; let hovered=null;

function initGL(){
  const canvas=document.getElementById('gl');
  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  scene=new THREE.Scene(); scene.background=new THREE.Color(0x05080f);
  camera=new THREE.PerspectiveCamera(55,1,0.1,8000);
  const amb=new THREE.AmbientLight(0x8899bb,0.55); scene.add(amb);
  const dir=new THREE.DirectionalLight(0xfff2dd,1.05); dir.position.set(-1,0.7,1.2); scene.add(dir);
  buildCosmic(); buildEarth();
  raycaster=new THREE.Raycaster(); mouse=new THREE.Vector2();
  resize(); window.addEventListener('resize',resize);
  bindControls();
  setStage("earth"); buildEarthMarkers();
  document.getElementById('loading').style.display="none";
  animate();
}

function buildCosmic(){
  cosmicGroup=new THREE.Group(); scene.add(cosmicGroup);
  // background starfield
  const N=2200,p=new Float32Array(N*3),c=new Float32Array(N*3);
  for(let i=0;i<N;i++){const r=900+Math.random()*900,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.cos(ph);p[i*3+2]=r*Math.sin(ph)*Math.sin(th);
    const t=0.6+Math.random()*0.4;c[i*3]=t;c[i*3+1]=t;c[i*3+2]=t*1.05;}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(p,3));g.setAttribute('color',new THREE.BufferAttribute(c,3));
  cosmicGroup.add(new THREE.Points(g,new THREE.PointsMaterial({size:2.2,vertexColors:true,transparent:true,opacity:0.9,depthWrite:false,blending:THREE.AdditiveBlending})));
  // spiral galaxy
  const M=7000,gp=new Float32Array(M*3),gc=new Float32Array(M*3);
  const core=new THREE.Color(0xffd9a0),arm=new THREE.Color(0x8fb6ff);
  for(let i=0;i<M;i++){const rr=Math.pow(Math.random(),1.7)*330;const armN=i%3;const base=armN*(Math.PI*2/3);
    const ang=base+rr*0.018+ (Math.random()-0.5)*0.5; const scat=(Math.random()-0.5)*(28*(1-rr/360)+6);
    gp[i*3]=Math.cos(ang)*rr+scat; gp[i*3+1]=(Math.random()-0.5)*(20*(1-rr/360)+2); gp[i*3+2]=Math.sin(ang)*rr+scat;
    const m=core.clone().lerp(arm,Math.min(1,rr/300));gc[i*3]=m.r;gc[i*3+1]=m.g;gc[i*3+2]=m.b;}
  const gg=new THREE.BufferGeometry();gg.setAttribute('position',new THREE.BufferAttribute(gp,3));gg.setAttribute('color',new THREE.BufferAttribute(gc,3));
  const galaxy=new THREE.Points(gg,new THREE.PointsMaterial({size:2.6,vertexColors:true,transparent:true,opacity:0.92,depthWrite:false,blending:THREE.AdditiveBlending}));
  galaxy.rotation.x=0.5; cosmicGroup.add(galaxy); cosmicGroup.userData.galaxy=galaxy;
  // core glow sprite
  const cv=document.createElement('canvas');cv.width=cv.height=128;const cx=cv.getContext('2d');
  const grd=cx.createRadialGradient(64,64,0,64,64,64);grd.addColorStop(0,'rgba(255,235,200,0.95)');grd.addColorStop(0.3,'rgba(255,205,150,0.5)');grd.addColorStop(1,'rgba(255,200,150,0)');
  cx.fillStyle=grd;cx.fillRect(0,0,128,128);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true}));
  sp.scale.set(150,150,1);sp.rotation.x=0.5;cosmicGroup.add(sp);
}

function makeEarthTexture(){
  const cv=document.createElement('canvas');cv.width=1024;cv.height=512;const x=cv.getContext('2d');
  const oc=x.createLinearGradient(0,0,0,512);oc.addColorStop(0,'#0b2238');oc.addColorStop(0.5,'#103a55');oc.addColorStop(1,'#0b2238');
  x.fillStyle=oc;x.fillRect(0,0,1024,512);
  // soft, abstract landmasses (esquemático, não cartográfico)
  x.save();x.globalAlpha=0.5;x.fillStyle='#2c4a3a';x.filter='blur(7px)';
  const blobs=[[230,170,70,46],[300,210,46,40],[300,330,40,80],[540,150,46,30],[560,250,60,80],[760,180,90,55],[820,330,40,30],[470,150,30,20]];
  blobs.forEach(b=>{x.beginPath();x.ellipse(b[0],b[1],b[2],b[3],0,0,Math.PI*2);x.fill();});
  x.restore();
  // graticule
  x.strokeStyle='rgba(150,180,200,0.10)';x.lineWidth=1;
  for(let lo=0;lo<=1024;lo+=1024/12){x.beginPath();x.moveTo(lo,0);x.lineTo(lo,512);x.stroke();}
  for(let la=0;la<=512;la+=512/6){x.beginPath();x.moveTo(0,la);x.lineTo(1024,la);x.stroke();}
  return new THREE.CanvasTexture(cv);
}
function buildEarth(){
  earthGroup=new THREE.Group(); scene.add(earthGroup);
  const R=120;
  globe=new THREE.Mesh(new THREE.SphereGeometry(R,64,48),new THREE.MeshStandardMaterial({map:makeEarthTexture(),roughness:0.95,metalness:0.0}));
  earthGroup.add(globe);
  // atmosphere
  const atm=new THREE.Mesh(new THREE.SphereGeometry(R*1.06,48,32),new THREE.MeshBasicMaterial({color:0x5aa6d8,transparent:true,opacity:0.10,side:THREE.BackSide,blending:THREE.AdditiveBlending}));
  earthGroup.add(atm);
  markersGroup=new THREE.Group(); earthGroup.add(markersGroup);
  earthGroup.userData.R=R;
}
function latLng(lat,lng,r){const phi=(90-lat)*Math.PI/180,th=(lng+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(th), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(th));}
function buildEarthMarkers(){
  if(!markersGroup)return;
  for(let i=markersGroup.children.length-1;i>=0;i--)markersGroup.remove(markersGroup.children[i]);
  markerMeshes.length=0;
  const sc=SCENES[activeScene];
  if(sc.status!=="full"){ // posicionada: sem marcadores reais (paleogeografia pendente)
    return;
  }
  const R=earthGroup.userData.R;
  const items=itemsForScene(activeScene).filter(it=> (LENS==="todas"||it.domain===LENS) && !it.global && it.lat!==undefined); // lente filtra por domínio; estados planetários não são pino (tempo profundo: só o impacto de Chicxulub é localizado)
  items.forEach(it=>{const med=it.pub!=="publicável";const col=new THREE.Color(med?0x7E8BA3:(CT[it.claimType]?.c||0xffffff));
    const m=new THREE.Mesh(new THREE.SphereGeometry(med?2.6:3.2,16,16),new THREE.MeshBasicMaterial({color:col,transparent:med,opacity:med?0.6:1}));
    m.position.copy(latLng(it.lat,it.lng,R*1.02)); m.userData={id:it.id,base:med?2.6:3.2}; markersGroup.add(m); markerMeshes.push(m);
    // little stem
    const stem=new THREE.Mesh(new THREE.SphereGeometry(0.8,8,8),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.5}));
    stem.position.copy(latLng(it.lat,it.lng,R*0.99)); markersGroup.add(stem);
  });
}

function setStage(mode){
  cosmicGroup.visible=(mode==="cosmic"); earthGroup.visible=(mode==="earth");
  const lim=mode==="cosmic"?COSMIC_CAM:EARTH_CAM; cam.r=Math.min(lim.max,Math.max(lim.min,lim.r));
  document.getElementById('hint').textContent = mode==="cosmic"
    ? "cosmos — arraste para girar · role para zoom · arraste o tempo p/ chegar à Terra"
    : "Terra — arraste para girar · role para zoom · clique num marcador";
}

/* controls (orbit manual, sem OrbitControls) */
function bindControls(){
  const el=renderer.domElement; let dragging=false,moved=0,lx=0,ly=0;
  el.addEventListener('pointerdown',e=>{dragging=true;moved=0;lx=e.clientX;ly=e.clientY;el.setPointerCapture(e.pointerId);});
  el.addEventListener('pointermove',e=>{
    if(dragging){const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;moved+=Math.abs(dx)+Math.abs(dy);
      cam.theta-=dx*0.005; cam.phi=Math.max(0.12,Math.min(Math.PI-0.12,cam.phi-dy*0.005));}
    else hover(e);
  });
  el.addEventListener('pointerup',e=>{dragging=false; if(moved<6) click(e);});
  el.addEventListener('pointercancel',()=>dragging=false);
  el.addEventListener('wheel',e=>{e.preventDefault(); const lim=stageMode==="cosmic"?COSMIC_CAM:EARTH_CAM;
    cam.r=Math.max(lim.min,Math.min(lim.max,cam.r*(1+e.deltaY*0.0012)));},{passive:false});
}
function pickPos(e){const r=renderer.domElement.getBoundingClientRect();mouse.x=((e.clientX-r.left)/r.width)*2-1;mouse.y=-((e.clientY-r.top)/r.height)*2+1;raycaster.setFromCamera(mouse,camera);}
function click(e){ if(stageMode!=="earth")return; pickPos(e); const hit=raycaster.intersectObjects(markerMeshes,false)[0]; if(hit)select(hit.object.userData.id); }
function hover(e){ const tip=document.getElementById('tip');
  if(stageMode!=="earth"||!markerMeshes.length){tip.style.display="none";if(hovered){hovered.scale.set(1,1,1);hovered=null;}return;}
  pickPos(e); const hit=raycaster.intersectObjects(markerMeshes,false)[0];
  if(hovered&&(!hit||hit.object!==hovered)){hovered.scale.set(1,1,1);hovered=null;}
  if(hit){hovered=hit.object;hovered.scale.set(1.6,1.6,1.6);const it=ALL_ITEMS.find(i=>i.id===hovered.userData.id);
    const r=renderer.domElement.getBoundingClientRect();tip.style.left=(e.clientX-r.left)+"px";tip.style.top=(e.clientY-r.top)+"px";
    tip.textContent=it.title+(it.pub!=="publicável"?" · em revisão":"");tip.style.display="block";renderer.domElement.style.cursor="pointer";}
  else {tip.style.display="none";renderer.domElement.style.cursor="grab";}
}

function resize(){const st=document.querySelector('.stage');W=st.clientWidth;H=st.clientHeight;renderer.setSize(W,H,false);camera.aspect=W/H;camera.updateProjectionMatrix();}
function animate(){requestAnimationFrame(animate);
  if(earthGroup.visible)earthGroup.rotation.y+=0.0009;
  if(cosmicGroup.visible){cosmicGroup.rotation.y+=0.0004; if(cosmicGroup.userData.galaxy)cosmicGroup.userData.galaxy.rotation.z+=0.0006;}
  const sp=Math.sin(cam.phi); camera.position.set(cam.target.x+cam.r*sp*Math.cos(cam.theta),cam.target.y+cam.r*Math.cos(cam.phi),cam.target.z+cam.r*sp*Math.sin(cam.theta));
  camera.lookAt(cam.target); renderer.render(scene,camera);
}

/* ============ PAINEL DE RESUMO ============ */
function renderSummary(){
  const el=document.getElementById('summary'); const sc=SCENES[activeScene];
  const lensLabel = LENS==="todas" ? "todos os domínios" : LENS;
  let items=[];
  if(stageMode==="cosmic"){
    items=Object.values(SCENES).filter(s=>s.stage==="cosmic" && (LENS==="todas"||s.domains.includes(LENS))).map(s=>({scene:s}));
  } else if(sc.status==="full"){
    items=itemsForScene(activeScene).filter(it=>LENS==="todas"||it.domain===LENS).map(it=>({item:it}));
  }
  // esqueleto: TEMPO › LENTE › EVENTOS
  let h=`<h2>tempo › lente › eventos</h2><div class="scene">${sc.title}</div>
    <div class="bread"><span class="bt">${fmtTime(activeTBP)}</span> › <span class="bl">${lensLabel}</span> › <span class="bn">${items.length} ${items.length===1?'evento':'eventos'}</span></div>`;
  if(items.length){
    let seeded=false;
    items.forEach(o=>{
      if(o.item){const it=o.item;const med=it.pub!=="publicável";const col=med?'#7E8BA3':(CT[it.claimType]?.c||'#fff'); if(it.seeded)seeded=true;
        h+=`<button class="sitem ${med?'med':''}" onclick="select('${it.id}')"><span class="dot" style="background:${col}"></span><span class="nm">${it.title}${it.claimset?' ⚖':''}${med?' ▦':''}${it.global?' 🌐':''}<br><span class="sub">${it.domain} · ${med?'em revisão':it.claimType}${it.seeded?' · semeado':''}</span></span></button>`;
      } else {const s=o.scene;
        h+=`<button class="sitem" onclick="select('${s.id}')"><span class="dot" style="background:var(--lens-fis)"></span><span class="nm">${s.title}<br><span class="sub">${s.era} · ${s.domains.join('/')}</span></span></button>`;}
    });
    if(seeded)h+=`<div class="lensnote">🌐 = estado planetário (não é ponto no mapa) · "semeado" = item de outro domínio, adicionado para a demonstração — passaria pela mesma revisão do corpus.</div>`;
  } else if(sc.status==="positioned"){
    h+=`<div class="lensnote">Cena posicionada no eixo (${sc.doc}). Itens e dossiê completos no Incremento 2.</div>`;
  } else {
    h+=`<div class="lensnote"><b style="color:var(--vellum)">Nenhum evento de ${lensLabel} aqui.</b><br>Lente vazia é informação: ${LENS==="historia"?"neste instante não havia humanidade — a história não tem o que registrar":"este domínio não tem evento neste recorte do tempo"}.</div>`;
  }
  if(stageMode==="earth" && sc.status==="full" && activeScene!=="s1789"){
    h+=`<div class="lensnote">Tempo profundo: <b>sem documentos</b> — tudo vem de proxies e reconstruções. O globo mostra a geografia da época em <b>reconstrução modelada</b>; a revisão científica completa segue pendente.</div>`;}
  if(sc.status==="full"){const arr=itemsForScene(activeScene);const pub=arr.filter(i=>i.pub==="publicável").length,med=arr.filter(i=>i.pub!=="publicável").length;
    h+=`<div class="tally">vista pública: <b style="color:var(--fact)">${pub}</b> como fato · <b>${med}</b> em revisão (mediados)</div>`;}
  el.innerHTML=h;
}

/* ============ DOSSIÊ ============ */
function chip(l,c){return `<span class="chip">${c?`<span class="swatch" style="background:${c}"></span>`:''}${l}</span>`;}
function closeDoss(){SEL=null;document.getElementById('dossier').classList.remove('open');}
function select(id){
  SEL=id; const d=document.getElementById('dossier'); let h=`<button class="x" onclick="closeDoss()" aria-label="Fechar">✕</button>`;
  if(SCENES[id]){const sc=SCENES[id];
    h+=`<div class="doss-type">cena · ${sc.domains.join(' / ')}</div><div class="doss-title">${sc.title}</div><div class="doss-id">${sc.era} · ${sc.stage==='cosmic'?'cosmos':'Terra'}</div>
      <div class="teaser">${sc.teaser}</div>
      <div class="soon"><b>${sc.status==='context'?'Contexto cósmico':'Posicionado no eixo'}</b>${sc.stage==='cosmic'?'Estado cósmico — domínio de física/química, em grande parte reconstrução modelada e inferência científica. ':''}O dossiê completo (claims, fontes, ClaimSets${sc.stage==='earth'?', reconstrução paleogeográfica':''}) entra no <b>Incremento 2</b>${sc.doc!=='futuro'?', fiel à '+sc.doc:''}.</div>`;
    d.innerHTML=h; d.classList.add('open'); return;
  }
  const it=ALL_ITEMS.find(i=>i.id===id); if(!it)return;
  const med=it.pub!=="publicável";
  if(med){const crit=/crítico/.test(it.gating||'');
    h+=`<div class="doss-type">${it.type} · ${it.layer}</div><div class="doss-title">${it.title}</div><div class="doss-id">${it.id}</div>
      <div class="gate ${crit?'crit':''}"><b>Em revisão — não exibido como fato</b>Este item existe na cena, mas não aparece como fato na vista pública.<br><br><span style="color:var(--dim)">Motivo:</span> ${it.gating}.</div>
      <div class="cs-note" style="border:0;padding:10px 0 0">O sistema mostra que o item existe e por que está retido — em vez de apagá-lo. A liberação é trabalho de curadoria (revisão humana).</div>`;
    d.innerHTML=h; d.classList.add('open'); return;
  }
  const ct=CT[it.claimType]||{c:'#fff'};
  h+=`<div class="doss-type">${it.type} · ${it.layer}</div><div class="doss-title">${it.title}</div><div class="doss-id">${it.id}</div>
    <div class="doss-claim">${it.claim}</div>
    <div class="row">${chip('domínio: '+it.domain)}${chip(it.claimType,ct.c)}${chip('confiança: '+it.confidence)}${chip('evidência: '+it.evidence)}</div>
    <dl class="meta"><dt>Quando</dt><dd>${it.date}</dd><dt>Onde</dt><dd>${it.place}</dd><dt>Fonte</dt><dd class="src">${it.source}${it.srcPend?' <span class="pend">◇ a confirmar</span>':''}</dd></dl>`;
  if(it.seeded)h+=`<div class="gate"><b>Item semeado para a demonstração</b>Conteúdo de ${it.domain} adicionado para mostrar que cada instante é atravessado por todas as lentes. Passaria pela mesma revisão do corpus antes de publicação.${it.global?' &nbsp;🌐 estado planetário — não é um ponto no mapa.':''}</div>`;
  if(it.know)h+=`<div class="know"><b>Como sabemos disso</b>${it.know}</div>`;
  if(it.anachronism)h+=`<div class="warn"><b>Aviso de anacronismo</b>${it.anachronism}</div>`;
  if(it.claimset){const cs=CLAIMSETS[it.claimset];h+=`<div class="cs"><div class="cs-h"><span style="font-size:14px">⚖</span><b style="font-weight:600">${cs.tema}</b><span class="cs-status">${cs.status}</span></div>`;
    cs.sides.forEach(sd=>h+=`<div class="cs-side"><span class="cs-w">${sd[1]}</span><span>${sd[0]}</span></div>`);
    if(cs.noeq)h+=`<div class="cs-noeq"><b>Sem equivalência</b>${cs.noeq}</div>`; h+=`<div class="cs-note">${cs.nota}</div></div>`;}
  d.innerHTML=h; d.classList.add('open');
}

/* ============ LENTE ============ */
function setLens(l){LENS=l;document.querySelectorAll('.lens button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.lens===l));
  if(stageMode==="earth")buildEarthMarkers(); renderAxis(); renderSummary();}

/* ============ BOOT ============ */
function boot(){ if(typeof THREE==="undefined"){document.getElementById('loading').textContent="falha ao carregar three.js (precisa de internet)";return;}
  renderAxis(); renderSummary(); initGL(); }
window.addEventListener('load',boot);
</script>
</body>
